name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Quick Action zip 빌드
        run: |
          ./build-workflow.sh
          # 릴리스 자산 파일명은 ASCII로 (GitHub이 한글 자산명을 변형/깨뜨릴 수 있음).
          # zip 내부 폴더명은 그대로 "NFC로 이름 정리.workflow".
          cp "NFC로 이름 정리.workflow.zip" nfd2nfc-quick-action.zip

      - name: GitHub Release 생성 + zip 첨부
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # 릴리스 존재 여부로 분기. `create || upload`는 create의 진짜 실패(권한·네트워크)를
          # upload 실패로 가려 디버깅을 어렵게 하므로, 존재할 때만(재실행/재태그) 자산을 갱신한다.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" nfd2nfc-quick-action.zip --clobber
          else
            gh release create "${GITHUB_REF_NAME}" nfd2nfc-quick-action.zip \
              --title "${GITHUB_REF_NAME}" --generate-notes
          fi
